name: Windows Build Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    types: [labeled, synchronize]

concurrency:
  group: pr-${{ github.event.pull_request.number }}-windows-build
  cancel-in-progress: true

jobs:
  preflight-skipped:
    if: "!( github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-pre-merge-checks') )"
    runs-on: ubuntu-slim
    name: Inform
    steps:
      - run: echo "Workflow not triggered — add label `run-pre-merge-checks` to this PR to run it." >> $GITHUB_STEP_SUMMARY

  preflight:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-pre-merge-checks')
    runs-on: ubuntu-slim
    name: Preflight check
    steps:
      - run: echo "::notice::Label 'run-pre-merge-checks' has been detected, triggering complementary checks."

  windows-build:
    needs: preflight
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.runner }} - ${{ matrix.test_preset }}

    strategy:
      matrix:
        include:
          - runner: windows-2022
            arch: x64
            name: msvc_release
            configure_preset: msvc_release
            build_preset: msvc_release
            test_preset: quick-validation-msvc-release

          - runner: windows-2025
            arch: x64
            name: msvc_release
            configure_preset: msvc_release
            build_preset: msvc_release
            test_preset: quick-validation-msvc-release

          - runner: windows-11-arm
            arch: arm64
            name: msvc_release
            configure_preset: msvc_release
            build_preset: msvc_release
            test_preset: quick-validation-msvc-release

    steps:
      - uses: actions/checkout@v4

      - name: Cache VCPKG
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\buildtrees
            ~\AppData\Local\vcpkg\archives
          key: ${{ runner.os }}-${{ matrix.arch }}-vcpkg-${{ matrix.name }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-vcpkg-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-${{ matrix.arch }}-cmake-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', '**/*.cmake') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-cmake-

      - name: Configure (${{ matrix.configure_preset }})
        env:
          VCPKG_ROOT: C:\vcpkg
        shell: pwsh
        run: |
          $outputFile = "configure_output.txt"

          cmake --preset ${{ matrix.configure_preset }} 2>&1 | Tee-Object -FilePath $outputFile
          $exitCode = $LASTEXITCODE

          if ($exitCode -eq 0) {
            Add-Content $env:GITHUB_STEP_SUMMARY "<details><summary>🟢 Configure Results (click to expand)</summary>"
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY "## 🔴 Configure Results"
          }

          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
          Get-Content $outputFile | Add-Content $env:GITHUB_STEP_SUMMARY
          Add-Content $env:GITHUB_STEP_SUMMARY '```'

          if ($exitCode -eq 0) {
            Add-Content $env:GITHUB_STEP_SUMMARY "</details>"
          }

          exit $exitCode

      - name: Build (${{ matrix.build_preset }})
        shell: pwsh
        run: |
          $outputFile = "build_output.txt"

          cmake --build --preset ${{ matrix.build_preset }} 2>&1 | Tee-Object -FilePath $outputFile
          $exitCode = $LASTEXITCODE

          if ($exitCode -eq 0) {
            Add-Content $env:GITHUB_STEP_SUMMARY "<details><summary>🟢 Build Results (click to expand)</summary>"
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY "## 🔴 Build Results"
          }

          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
          Get-Content $outputFile | Add-Content $env:GITHUB_STEP_SUMMARY
          Add-Content $env:GITHUB_STEP_SUMMARY '```'

          if ($exitCode -eq 0) {
            Add-Content $env:GITHUB_STEP_SUMMARY "</details>"
          }

          exit $exitCode

      - name: Test (${{ matrix.test_preset }})
        shell: pwsh
        run: |
          $outputFile = "test_output.txt"

          ctest --preset ${{ matrix.test_preset }} --output-on-failure 2>&1 | Tee-Object -FilePath $outputFile
          $exitCode = $LASTEXITCODE

          if ($exitCode -eq 0) {
            Add-Content $env:GITHUB_STEP_SUMMARY "<details><summary>🟢 Test Results (click to expand)</summary>"
          } else {
            Add-Content $env:GITHUB_STEP_SUMMARY "## 🔴 Test Results"
          }

          Add-Content $env:GITHUB_STEP_SUMMARY ""
          Add-Content $env:GITHUB_STEP_SUMMARY '```'
          Get-Content $outputFile | Add-Content $env:GITHUB_STEP_SUMMARY
          Add-Content $env:GITHUB_STEP_SUMMARY '```'

          if ($exitCode -eq 0) {
            Add-Content $env:GITHUB_STEP_SUMMARY "</details>"
          }

          exit $exitCode
