name: MacOS Build Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    types: [labeled, synchronize]

concurrency:
  group: pr-${{ github.event.pull_request.number }}-macos-build
  cancel-in-progress: true

jobs:
jobs:
  setup-matrix:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        env:
          IS_PR:       ${{ github.event_name == 'pull_request' }}
          IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          HAS_LABEL:   ${{ contains(github.event.pull_request.labels.*.name, 'run-pre-merge-checks') }}
        run: |
          if [[ "$IS_DISPATCH" == "true" ]] || \
             [[ "$IS_PR" == "true" && "$HAS_LABEL" == "true" ]]; then
            MATRIX='{"include":[
              {"runner":"macos-26",       "arch":"arm64", "name":"clang_release", "configure_preset": "clang_release", "build_preset": "clang_release", "test_preset": "quick-validation-clang-release"}
              {"runner":"macos-26-intel", "arch":"intel", "name":"clang_release", "configure_preset": "clang_release", "build_preset": "clang_release", "test_preset": "quick-validation-clang-release"},
            ]}'
          else
            MATRIX='{"include":[]}'
          fi

          EOF_MARKER=$(openssl rand -hex 8)
          { echo "matrix<<$EOF_MARKER"; echo "$MATRIX"; echo "$EOF_MARKER"; } >> $GITHUB_OUTPUT

  macos-build:
    needs: setup-matrix
    if: ${{ needs.setup-matrix.outputs.matrix != '{"include":[]}' }}
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.runner }} - ${{ matrix.test_preset }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pre-installed VCPKG
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Cache VCPKG
        run: |
          # Use the GitHub Actions cache as a binary source
          echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> $GITHUB_ENV
        env:
          # These variables are required for the 'x-gha' provider to talk to GitHub's cache API
          ACTIONS_CACHE_URL: ${{ secrets.ACTIONS_CACHE_URL }}
          ACTIONS_RUNTIME_TOKEN: ${{ secrets.ACTIONS_RUNTIME_TOKEN }}

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-${{ matrix.arch }}-cmake-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', '**/*.cmake') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-cmake-

      - name: Configure (${{ matrix.configure_preset }})
        uses: ./.github/actions/_log_to_gh_summary
        with:
          step-name: Configure (${{ matrix.configure_preset }})
          command: "cmake --preset ${{ matrix.configure_preset }}"

      - name: Build (${{ matrix.build_preset }})
        uses: ./.github/actions/_log_to_gh_summary
        with:
          step-name: Build (${{ matrix.build_preset }})
          command: "cmake --build --preset ${{ matrix.build_preset }}"

      - name: Test (${{ matrix.test_preset }})
        uses: ./.github/actions/_log_to_gh_summary
        with:
          step-name: Test (${{ matrix.test_preset }})
          command: "ctest --preset ${{ matrix.test_preset }} --output-on-failure"
