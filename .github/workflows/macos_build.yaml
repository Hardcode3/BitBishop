name: MacOS ARM Build Test

on:
  workflow_dispatch:
  push:
  # pull_request:
  #   types: [labeled, synchronize]

jobs:
  macos-arm-build:
    # if: contains(github.event.pull_request.labels.*.name, 'run-pre-merge-checks')
    runs-on: macos-26
    name: ${{ matrix.test_preset }}

    concurrency:
      group: pr-${{ github.event.pull_request.number }}-macos-arm-build
      cancel-in-progress: true

    strategy:
      matrix:
        include:
          - name: clang_debug
            configure_preset: clang_debug
            build_preset: clang_debug
            test_preset: quick-validation-clang-debug
          - name: clang_release
            configure_preset: clang_release
            build_preset: clang_release
            test_preset: quick-validation-clang-release

    steps:
      - uses: actions/checkout@v4

      - name: Setup pre-installed VCPKG
        run: |
          echo "VCPKG_ROOT=$VCPKG_INSTALLATION_ROOT" >> $GITHUB_ENV

      - name: Cache VCPKG
        run: |
          # Use the GitHub Actions cache as a binary source
          echo "VCPKG_BINARY_SOURCES=clear;x-gha,readwrite" >> $GITHUB_ENV
        env:
          # These variables are required for the 'x-gha' provider to talk to GitHub's cache API
          ACTIONS_CACHE_URL: ${{ secrets.ACTIONS_CACHE_URL }}
          ACTIONS_RUNTIME_TOKEN: ${{ secrets.ACTIONS_RUNTIME_TOKEN }}

      - name: Configure (${{ matrix.configure_preset }})
        shell: bash
        run: |
          set +e
          cmake --preset ${{ matrix.configure_preset }} 2>&1 | tee configure_output.txt
          CONFIGURE_EXIT_CODE=${PIPESTATUS[0]}  # Capture CMake exit code, not tee
          set -e

          if [ $CONFIGURE_EXIT_CODE -eq 0 ]; then
            echo "<details><summary>🟢 Configure Results (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🔴 Configure Results" >> $GITHUB_STEP_SUMMARY
          fi
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat configure_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $CONFIGURE_EXIT_CODE -eq 0 ]; then
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

          exit $CONFIGURE_EXIT_CODE

      - name: Build (${{ matrix.build_preset }})
        shell: bash
        run: |
          set +e
          cmake --build --preset ${{ matrix.build_preset }} 2>&1 | tee build_output.txt
          BUILD_EXIT_CODE=${PIPESTATUS[0]}  # Capture CMake exit code, not tee
          set -e

          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "<details><summary>🟢 Build Results (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🔴 Build Results" >> $GITHUB_STEP_SUMMARY
          fi
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat build_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

          exit $BUILD_EXIT_CODE

      - name: Test (${{ matrix.test_preset }})
        shell: bash
        run: |
          set +e
          ctest --preset ${{ matrix.test_preset }} --output-on-failure 2>&1 | tee test_output.txt
          TEST_EXIT_CODE=${PIPESTATUS[0]}  # Capture CMake exit code, not tee
          set -e

          if [ $TEST_EXIT_CODE -eq 0 ]; then
            echo "<details><summary>🟢 Test Results (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🔴 Test Results" >> $GITHUB_STEP_SUMMARY
          fi
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $TEST_EXIT_CODE -eq 0 ]; then
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

          exit $TEST_EXIT_CODE
