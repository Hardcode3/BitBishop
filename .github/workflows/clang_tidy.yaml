name: Clang Tidy Linting

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    types: [ synchronize ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  clang-tidy-linting:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.runner }} - ${{ matrix.build_preset }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04-arm
            arch: arm64
            configure_preset: clang_debug
            build_preset: clang_debug

    steps:
      - uses: actions/checkout@v4

      - name: Setup Linux CI
        uses: ./.github/actions/_setup_linux_ci
        with:
          arch: ${{ matrix.arch }}
          cache-name: ${{ matrix.build_preset }}

      - name: Configure (${{ matrix.configure_preset }})
        uses: ./.github/actions/_log_to_gh_summary_bash
        with:
          step-name: Configure (${{ matrix.configure_preset }})
          command: "cmake --preset ${{ matrix.configure_preset }}"

      - name: Run clang-tidy
        uses: ./.github/actions/_log_to_gh_summary_bash
        with:
          step-name: Run clang-tidy (${{ matrix.configure_preset }})
          command: "cmake --build --preset ${{ matrix.build_preset }} --target clang-tidy"
