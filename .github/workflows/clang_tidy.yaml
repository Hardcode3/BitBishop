name: Clang Tidy Linting

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}-clang-tidy-linting
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  clang-tidy-linting:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.runner }} - ${{ matrix.name }}

    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x64
            name: clang_debug
            configure_preset: clang_debug
            build_preset: clang_debug

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            clang-tidy \
            gcc \
            g++ \
            git \
            curl \
            zip \
            unzip \
            pkg-config \
            ninja-build \
            cmake

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=/tmp/vcpkg" >> $GITHUB_ENV
          echo "/tmp/vcpkg" >> $GITHUB_PATH

      - name: Cache VCPKG
        uses: actions/cache@v4
        with:
          path: |
            /tmp/vcpkg/downloads
            /tmp/vcpkg/installed
            ~/.cache/vcpkg
          key: ${{ runner.os }}-vcpkg-${{ matrix.name }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: ${{ runner.os }}-vcpkg-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', '**/*.cmake') }}
          restore-keys: ${{ runner.os }}-cmake-

      - name: Configure (${{ matrix.configure_preset }})
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Run clang-tidy
        uses: ./.github/actions/_log_to_gh_summary
        with:
          step-name: Run clang-tidy (${{ matrix.configure_preset }})
          command: "cmake --build --preset ${{ matrix.build_preset }} --target clang-tidy"
