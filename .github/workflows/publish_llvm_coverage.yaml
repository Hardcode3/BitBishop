name: Publish LLVM Coverage

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

jobs:
  linux-coverage-publish:
    runs-on: ubuntu-24.04
    name: ubuntu-24.04 - quick-validation-clang-debug

    steps:
      - uses: actions/checkout@v4

      - name: Setup Linux CI
        uses: ./.github/actions/_setup_linux_ci
        with:
          arch: x64
          cache-name: clang_debug

      - name: Configure (clang_debug)
        uses: ./.github/actions/_log_to_gh_summary_bash
        with:
          step-name: Configure (clang_debug)
          command: "cmake --preset clang_debug"

      - name: Build (clang_debug)
        uses: ./.github/actions/_log_to_gh_summary_bash
        with:
          step-name: Build (clang_debug)
          command: "cmake --build --preset clang_debug"

      - name: Publish coverage (clang_debug)
        uses: ./.github/actions/_publish_llvm_coverage
        with:
          build-preset: clang_debug
          github-token: ${{ secrets.GITHUB_TOKEN }}
