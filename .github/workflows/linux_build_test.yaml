name: Linux Build Test

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
    types: [labeled, synchronize]

concurrency:
  group: pr-${{ github.event.pull_request.number }}-linux-build
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  debug:
    uses: ./.github/workflows/_rwf_linux_build_test.yaml
    with:
      build_type: debug

  release:
    if: |
      (
        github.event_name == 'pull_request' &&
        contains(github.event.pull_request.labels.*.name, 'run-pre-merge-checks')
      )
    uses: ./.github/workflows/_rwf_linux_build_test.yaml
    with:
      build_type: release
