name: Linux Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  plan-linux-build:
    runs-on: ubuntu-slim
    name: Plan Linux Build
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.set-matrix.outputs.should_run }}

    steps:
      - id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REF: ${{ github.ref }}
          HAS_PREMERGE_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-pre-merge-checks') || false }}
          ADDED_LABEL: ${{ github.event.action == 'labeled' && github.event.label.name || '' }}
        run: |
          if [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            MATRIX='{"include":[
              {"runner":"ubuntu-24.04","arch":"x64","name":"clang_debug","configure_preset":"clang_debug","build_preset":"clang_debug","test_preset":"quick-validation-clang-debug","publish_coverage":true}
            ]}'
          elif [[ "$EVENT_NAME" == "pull_request" && "$EVENT_ACTION" == "labeled" && "$ADDED_LABEL" == "run-pre-merge-checks" ]]; then
            MATRIX='{"include":[
              {"runner":"ubuntu-24.04","arch":"x64","name":"clang_release","configure_preset":"clang_release","build_preset":"clang_release","test_preset":"quick-validation-clang-release","publish_coverage":false},
              {"runner":"ubuntu-24.04-arm","arch":"arm64","name":"clang_release","configure_preset":"clang_release","build_preset":"clang_release","test_preset":"quick-validation-clang-release","publish_coverage":false}
            ]}'
          elif [[ "$EVENT_NAME" == "pull_request" && "$EVENT_ACTION" != "labeled" && "$HAS_PREMERGE_LABEL" == "true" ]]; then
            MATRIX='{"include":[
              {"runner":"ubuntu-24.04","arch":"x64","name":"clang_debug","configure_preset":"clang_debug","build_preset":"clang_debug","test_preset":"quick-validation-clang-debug","publish_coverage":false},
              {"runner":"ubuntu-24.04","arch":"x64","name":"clang_release","configure_preset":"clang_release","build_preset":"clang_release","test_preset":"quick-validation-clang-release","publish_coverage":false},
              {"runner":"ubuntu-24.04-arm","arch":"arm64","name":"clang_release","configure_preset":"clang_release","build_preset":"clang_release","test_preset":"quick-validation-clang-release","publish_coverage":false}
            ]}'
          elif [[ "$EVENT_NAME" == "pull_request" && "$EVENT_ACTION" != "labeled" ]]; then
            MATRIX='{"include":[
              {"runner":"ubuntu-24.04","arch":"x64","name":"clang_debug","configure_preset":"clang_debug","build_preset":"clang_debug","test_preset":"quick-validation-clang-debug","publish_coverage":false}
            ]}'
          else
            MATRIX='{"include":[]}'
          fi

          if [[ "$MATRIX" == '{"include":[]}' ]]; then
            SHOULD_RUN=false
          else
            SHOULD_RUN=true
          fi

          EOF_MARKER=$(openssl rand -hex 8)
          {
            echo "matrix<<$EOF_MARKER"
            echo "$MATRIX"
            echo "$EOF_MARKER"
            echo "should_run=$SHOULD_RUN"
          } >> "$GITHUB_OUTPUT"

  linux-build:
    needs: plan-linux-build
    if: needs.plan-linux-build.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-linux-build.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.runner }} - ${{ matrix.test_preset }}

    permissions:
      # The main-branch coverage lane publishes to gh-pages.
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Linux CI
        uses: ./.github/actions/_setup_linux_ci
        with:
          arch: ${{ matrix.arch }}
          cache-name: ${{ matrix.name }}

      - name: Configure (${{ matrix.configure_preset }})
        uses: ./.github/actions/_log_to_gh_summary_bash
        with:
          step-name: Configure (${{ matrix.configure_preset }})
          command: "cmake --preset ${{ matrix.configure_preset }}"

      - name: Build (${{ matrix.build_preset }})
        uses: ./.github/actions/_log_to_gh_summary_bash
        with:
          step-name: Build (${{ matrix.build_preset }})
          command: "cmake --build --preset ${{ matrix.build_preset }}"

      - name: Test (${{ matrix.test_preset }})
        uses: ./.github/actions/_log_to_gh_summary_bash
        with:
          step-name: Test (${{ matrix.test_preset }})
          command: "ctest --preset ${{ matrix.test_preset }} --output-on-failure"

      - name: Publish coverage (${{ matrix.build_preset }})
        if: matrix.publish_coverage
        uses: ./.github/actions/_publish_linux_coverage
        with:
          build-preset: ${{ matrix.build_preset }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
