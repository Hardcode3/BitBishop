name: Linux Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [opened, reopened, synchronize, labeled]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  plan-linux-build:
    runs-on: ubuntu-slim
    name: Plan Linux Build
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_run: ${{ steps.set-matrix.outputs.should_run }}

    steps:
      - id: set-matrix
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REF: ${{ github.ref }}
          HAS_PREMERGE_LABEL: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'run-pre-merge-checks') || false }}
          ADDED_LABEL: ${{ github.event.action == 'labeled' && github.event.label.name || '' }}
        run: |
          if [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            MATRIX='{"include":[
              {"runner":"ubuntu-24.04","arch":"x64","name":"clang_debug","configure_preset":"clang_debug","build_preset":"clang_debug","test_preset":"quick-validation-clang-debug","publish_coverage":true}
            ]}'
          elif [[ "$EVENT_NAME" == "pull_request" && "$EVENT_ACTION" == "labeled" && "$ADDED_LABEL" == "run-pre-merge-checks" ]]; then
            MATRIX='{"include":[
              {"runner":"ubuntu-24.04","arch":"x64","name":"clang_release","configure_preset":"clang_release","build_preset":"clang_release","test_preset":"quick-validation-clang-release","publish_coverage":false},
              {"runner":"ubuntu-24.04-arm","arch":"arm64","name":"clang_release","configure_preset":"clang_release","build_preset":"clang_release","test_preset":"quick-validation-clang-release","publish_coverage":false}
            ]}'
          elif [[ "$EVENT_NAME" == "pull_request" && "$EVENT_ACTION" != "labeled" && "$HAS_PREMERGE_LABEL" == "true" ]]; then
            MATRIX='{"include":[
              {"runner":"ubuntu-24.04","arch":"x64","name":"clang_debug","configure_preset":"clang_debug","build_preset":"clang_debug","test_preset":"quick-validation-clang-debug","publish_coverage":false},
              {"runner":"ubuntu-24.04","arch":"x64","name":"clang_release","configure_preset":"clang_release","build_preset":"clang_release","test_preset":"quick-validation-clang-release","publish_coverage":false},
              {"runner":"ubuntu-24.04-arm","arch":"arm64","name":"clang_release","configure_preset":"clang_release","build_preset":"clang_release","test_preset":"quick-validation-clang-release","publish_coverage":false}
            ]}'
          elif [[ "$EVENT_NAME" == "pull_request" && "$EVENT_ACTION" != "labeled" ]]; then
            MATRIX='{"include":[
              {"runner":"ubuntu-24.04","arch":"x64","name":"clang_debug","configure_preset":"clang_debug","build_preset":"clang_debug","test_preset":"quick-validation-clang-debug","publish_coverage":false}
            ]}'
          else
            MATRIX='{"include":[]}'
          fi

          if [[ "$MATRIX" == '{"include":[]}' ]]; then
            SHOULD_RUN=false
          else
            SHOULD_RUN=true
          fi

          EOF_MARKER=$(openssl rand -hex 8)
          {
            echo "matrix<<$EOF_MARKER"
            echo "$MATRIX"
            echo "$EOF_MARKER"
            echo "should_run=$SHOULD_RUN"
          } >> "$GITHUB_OUTPUT"

  linux-build:
    needs: plan-linux-build
    if: needs.plan-linux-build.outputs.should_run == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-linux-build.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.runner }} - ${{ matrix.test_preset }}

    permissions:
      # The main-branch coverage lane publishes to gh-pages.
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            clang-tidy \
            llvm \
            gcc \
            g++ \
            git \
            curl \
            zip \
            unzip \
            pkg-config \
            ninja-build \
            cmake

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git /tmp/vcpkg
          /tmp/vcpkg/bootstrap-vcpkg.sh
          echo "VCPKG_ROOT=/tmp/vcpkg" >> $GITHUB_ENV
          echo "/tmp/vcpkg" >> $GITHUB_PATH

      - name: Cache VCPKG
        uses: actions/cache@v4
        with:
          path: |
            /tmp/vcpkg/downloads
            /tmp/vcpkg/installed
            ~/.cache/vcpkg
          key: ${{ runner.os }}-${{ matrix.arch }}-vcpkg-${{ matrix.name }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-vcpkg-

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-${{ matrix.arch }}-cmake-${{ matrix.name }}-${{ hashFiles('CMakeLists.txt', '**/*.cmake') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-cmake-

      - name: Configure (${{ matrix.configure_preset }})
        uses: ./.github/actions/_log_to_gh_summary
        with:
          step-name: Configure (${{ matrix.configure_preset }})
          command: "cmake --preset ${{ matrix.configure_preset }}"

      - name: Build (${{ matrix.build_preset }})
        uses: ./.github/actions/_log_to_gh_summary
        with:
          step-name: Build (${{ matrix.build_preset }})
          command: "cmake --build --preset ${{ matrix.build_preset }}"

      - name: Test (${{ matrix.test_preset }})
        uses: ./.github/actions/_log_to_gh_summary
        with:
          step-name: Test (${{ matrix.test_preset }})
          command: "ctest --preset ${{ matrix.test_preset }} --output-on-failure"

      - name: Generate markdown coverage report (${{ matrix.test_preset }})
        if: matrix.publish_coverage
        shell: bash
        run: |
          set +e
          cmake --build --preset ${{ matrix.build_preset }} --target coverage-markdown 2>&1 | tee coverage_gh_summary.txt
          COV_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          COVERAGE_FILE=$(grep -Po "GitHub Markdown summary written to: \K.*" coverage_gh_summary.txt)

          if [ $COV_EXIT_CODE -eq 0 ]; then
            echo "<details><summary>🟢 Coverage Results (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🔴 Coverage Results" >> $GITHUB_STEP_SUMMARY
          fi
          echo '' >> $GITHUB_STEP_SUMMARY
          cat $COVERAGE_FILE >> $GITHUB_STEP_SUMMARY
          if [ $COV_EXIT_CODE -eq 0 ]; then
            echo "</details>" >> $GITHUB_STEP_SUMMARY
          fi

          exit $COV_EXIT_CODE

      - name: Generate html coverage report (${{ matrix.test_preset }})
        if: matrix.publish_coverage
        id: htmlcov
        shell: bash
        run: |
          set +e
          cmake --build --preset ${{ matrix.build_preset }} --target coverage-html 2>&1 | tee coverage_html_summary.txt
          COV_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          HTML_COV_DIR=$(grep -Po "HTML coverage directory: \K.*" coverage_html_summary.txt)
          echo "HTML_COV_DIR=$HTML_COV_DIR" >> "$GITHUB_OUTPUT"

          exit $COV_EXIT_CODE

      - name: Generate shields.io badge (${{ matrix.test_preset }})
        if: matrix.publish_coverage
        id: shieldsio
        shell: bash
        run: |
          set +e
          cmake --build --preset ${{ matrix.build_preset }} --target coverage-shieldsio 2>&1 | tee coverage_shieldsio_summary.txt
          COV_EXIT_CODE=${PIPESTATUS[0]}
          set -e

          SHIELDSIO_REGION_COV_BADGE_FILE=$(grep -Po "Shields.io Region Coverage badge written to: \K.*" coverage_shieldsio_summary.txt)
          SHIELDSIO_FUNCTION_COV_BADGE_FILE=$(grep -Po "Shields.io Function Coverage badge written to: \K.*" coverage_shieldsio_summary.txt)
          SHIELDSIO_LINE_COV_BADGE_FILE=$(grep -Po "Shields.io Line Coverage badge written to: \K.*" coverage_shieldsio_summary.txt)
          SHIELDSIO_BRANCH_COV_BADGE_FILE=$(grep -Po "Shields.io Branch Coverage badge written to: \K.*" coverage_shieldsio_summary.txt)

          echo "SHIELDSIO_REGION_COV_BADGE_FILE=$SHIELDSIO_REGION_COV_BADGE_FILE" >> "$GITHUB_OUTPUT"
          echo "SHIELDSIO_FUNCTION_COV_BADGE_FILE=$SHIELDSIO_FUNCTION_COV_BADGE_FILE" >> "$GITHUB_OUTPUT"
          echo "SHIELDSIO_LINE_COV_BADGE_FILE=$SHIELDSIO_LINE_COV_BADGE_FILE" >> "$GITHUB_OUTPUT"
          echo "SHIELDSIO_BRANCH_COV_BADGE_FILE=$SHIELDSIO_BRANCH_COV_BADGE_FILE" >> "$GITHUB_OUTPUT"

          exit $COV_EXIT_CODE

      - name: Prepare files
        if: matrix.publish_coverage
        shell: bash
        run: |
          mkdir -p out/coverage/badges
          cp -r "${{ steps.htmlcov.outputs.HTML_COV_DIR }}" out/coverage/
          cp "${{ steps.shieldsio.outputs.SHIELDSIO_REGION_COV_BADGE_FILE }}" out/coverage/badges
          cp "${{ steps.shieldsio.outputs.SHIELDSIO_FUNCTION_COV_BADGE_FILE }}" out/coverage/badges
          cp "${{ steps.shieldsio.outputs.SHIELDSIO_LINE_COV_BADGE_FILE }}" out/coverage/badges
          cp "${{ steps.shieldsio.outputs.SHIELDSIO_BRANCH_COV_BADGE_FILE }}" out/coverage/badges

      - name: Publish coverage badge and report to gh-pages
        if: matrix.publish_coverage
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: out
          keep_files: true
