name: Setup Linux CMake CI
description: Installs the Linux toolchain, bootstraps vcpkg, and restores common CMake caches

inputs:
  arch:
    description: Architecture label used in cache keys
    required: true
  cache-name:
    description: Build flavor label used in cache keys
    required: true

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          clang \
          clang-tidy \
          llvm \
          gcc \
          g++ \
          git \
          curl \
          zip \
          unzip \
          pkg-config \
          ninja-build \
          cmake

    - name: Setup vcpkg
      shell: bash
      run: |
        git clone https://github.com/microsoft/vcpkg.git /tmp/vcpkg
        /tmp/vcpkg/bootstrap-vcpkg.sh
        echo "VCPKG_ROOT=/tmp/vcpkg" >> "$GITHUB_ENV"
        echo "/tmp/vcpkg" >> "$GITHUB_PATH"

    - name: Cache VCPKG
      uses: actions/cache@v4
      with:
        path: |
          /tmp/vcpkg/downloads
          /tmp/vcpkg/installed
          ~/.cache/vcpkg
        key: ${{ runner.os }}-${{ inputs.arch }}-vcpkg-${{ inputs.cache-name }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: ${{ runner.os }}-${{ inputs.arch }}-vcpkg-

    - name: Cache build
      uses: actions/cache@v4
      with:
        path: build
        key: ${{ runner.os }}-${{ inputs.arch }}-cmake-${{ inputs.cache-name }}-${{ hashFiles('CMakeLists.txt', '**/*.cmake') }}
        restore-keys: ${{ runner.os }}-${{ inputs.arch }}-cmake-
